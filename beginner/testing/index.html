<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Master Quiz</title>
    <script src="https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/js/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/js/chess.min.js"></script>
    
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/css/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #1a1c2c; --card-bg: #25283d; --accent: #6366f1;
            --success: #22c55e; --error: #ef4444; --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--text); overflow: hidden;
        }
        .hidden-pieces .piece-417db { display: none !important; }
        .hidden-labels .notation-322f9 { display: none !important; }
        .piece-417db { pointer-events: none; }
        .square-55d63 { cursor: pointer !important; position: relative; }
        .highlight-selected { box-shadow: inset 0 0 3px 3px yellow !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-board { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes blink-red {
            0%, 100% { background: rgba(255,255,255,0.1); color: var(--accent); }
            50% { background: var(--error); color: white; }
        }
        .blink-error { animation: blink-red 0.4s ease-in-out 0s 2; }

        .mode-tag { position: absolute; top: 15px; left: 15px; padding: 5px 15px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; z-index: 100; display:none; }
        .quiz-container { background: var(--card-bg); padding: 1.5rem; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 480px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .turn-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.1); font-size: 0.9rem; margin-bottom: 10px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; transition: all 0.3s; }
        #board { width: 100%; max-width: 400px; margin: 0 auto; border: 4px solid #334155; border-radius: 8px; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: none; }
        .btn-secondary { background: #475569; }
        .status-msg { font-size: 1.1rem; font-weight: 600; margin-top: 10px; min-height: 1.5em; }
        .msg-correct { color: var(--success); }
        .msg-wrong { color: var(--error); }
        #score-screen { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--card-bg); border-radius: 20px; z-index: 10; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body class="">
    <div class="mode-tag"></div>
    <div class="quiz-container">
        <div id="score-screen">
            <i class="fas fa-trophy" style="font-size: 3rem; color: #f1c40f;"></i>
            <h2>Quiz Completed!</h2>
            <div id="final-score-val" style="font-size: 2rem; color: var(--accent); margin: 20px 0;">0/0</div>
            <button class="btn-action" style="display:block;" onclick="location.reload()">Try Again</button>
        </div>
        <div class="turn-badge" id="turn-display">White to Move</div>
        <h2 id="q-text" style="color: var(--accent); margin:0;">Chess Quiz</h2>
        <div id="q-progress" style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 1rem;">Ready to Play</div>
        <div id="board"></div>
        <div class="status-msg" id="status">Ready</div>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
            <button id="try-again-btn" class="btn-action btn-secondary" onclick="resetPuzzleMove()">Try Again</button>
            <button id="see-answer-btn" class="btn-action" onclick="showAnswer()">See Answer</button>
            <button id="next-btn" class="btn-action" onclick="nextPuzzle()">Next Puzzle</button>
        </div>
    </div>

    <script>
        var puzzles = [{"question": "Puzzle 1", "start": "rnbqkbnr/ppp1pppp/8/3p4/4P3/8/PPPP1PPP/RNBQKBNR w KQkq d6 0 2", "target": "rnbqkbnr/ppp1pppp/8/3P4/8/8/PPPP1PPP/RNBQKBNR b KQkq - 0 2"}, {"question": "Puzzle 2", "start": "rnbqkbnr/ppp1pppp/8/3P4/8/8/PPPP1PPP/RNBQKBNR b KQkq - 0 2", "target": "rnb1kbnr/ppp1pppp/8/3q4/8/8/PPPP1PPP/RNBQKBNR w KQkq - 0 3"}], isPreview = true;
        var game = new Chess(), board = null, pyjs = null;
        var currentIdx = 0, totalScore = 0, hasFailedCurrent = false, selectedSquare = null;

        const sounds = {
            move: new Audio('https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/sounds/public_sound_standard_Move.mp3'),
            capture: new Audio('https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/sounds/public_sound_standard_Capture.mp3'),
            select: new Audio('https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/sounds/public_sound_standard_GenericNotify.mp3'),
            error: new Audio('https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/sounds/public_sound_standard_Error.mp3')
        };

        function playSound(type) {
            sounds[type].currentTime = 0;
            sounds[type].play().catch(e => {});
        }

        function triggerErrorEffects(msg) {
            playSound('error');
            $('#board').addClass('shake-board');
            $('#turn-display').addClass('blink-error');
            if(msg) $('#status').addClass('msg-wrong').text(msg);
            setTimeout(() => {
                $('#board').removeClass('shake-board');
                $('#turn-display').removeClass('blink-error');
            }, 500);
        }

        if (window.qt) {
            new QWebChannel(qt.webChannelTransport, (ch) => { pyjs = ch.objects.pyjs; updateTurnUI(); });
        }

        function updateTurnUI() {
            let turn = game.turn() === 'w' ? 'White' : 'Black';
            $('#turn-display').text(turn + " to Move");
            if (pyjs) pyjs.update_turn_status(turn);
        }

        function initClickEvents() {
            $('#board').on('click', '.square-55d63', function() {
                var square = $(this).attr('data-square');
                handleSquareClick(square);
            });
        }

        function handleSquareClick(square) {
            if ($('#next-btn').is(':visible') || $('#try-again-btn').is(':visible')) return;

            // --- RE-CLICK / DESELECT CHECK ---
            if (selectedSquare === square) {
                selectedSquare = null;
                $('.square-55d63').removeClass('highlight-selected');
                triggerErrorEffects("Action canceled");
                return;
            }

            if (selectedSquare === null) {
                let piece = game.get(square);
                if (piece) {
                    // --- TURN CHECK ---
                    if (piece.color !== game.turn()) {
                        triggerErrorEffects("Not your turn!");
                        return;
                    }
                    selectedSquare = square;
                    $('.square-55d63').removeClass('highlight-selected');
                    $('.square-' + square).addClass('highlight-selected');
                    playSound('select');
                    $('#status').removeClass('msg-wrong').text('Select destination');
                }
            } else {
                // --- PAWN BLOCKING RULE ---
                let movingPiece = game.get(selectedSquare);
                if (movingPiece && movingPiece.type === 'p') {
                    let fromFile = selectedSquare[0];
                    let toFile = square[0];
                    if (fromFile === toFile && game.get(square)) {
                        triggerErrorEffects("Move not allowed: Path blocked!");
                        selectedSquare = null;
                        $('.square-55d63').removeClass('highlight-selected');
                        return;
                    }
                }

                let targetPiece = game.get(square);
                let move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                
                $('.square-55d63').removeClass('highlight-selected');
                
                if (move === null) {
                    let newPiece = game.get(square);
                    if (newPiece && newPiece.color === game.turn()) {
                        selectedSquare = square;
                        $('.square-' + square).addClass('highlight-selected');
                        playSound('select');
                    } else {
                        selectedSquare = null;
                        triggerErrorEffects("Invalid move!");
                    }
                } else {
                    selectedSquare = null;
                    board.position(game.fen());
                    if (targetPiece) playSound('capture');
                    else playSound('move');
                    updateTurnUI();
                    
                    if (!isPreview) {
                        if (pyjs) pyjs.update_pg_from_js(game.pgn());
                    } else {
                        let targetPos = puzzles[currentIdx].target.split(' ')[0];
                        if (game.fen().split(' ')[0] === targetPos) handleSuccess();
                        else handleFailure();
                    }
                }
            }
        }

        function handleSuccess() {
            if (!hasFailedCurrent) totalScore++;
            $('#status').removeClass('msg-wrong').addClass('msg-correct').text('Correct Move!');
            if (currentIdx < puzzles.length - 1) $('#next-btn').show();
            else setTimeout(showFinalScore, 1500);
        }

        function handleFailure() {
            hasFailedCurrent = true;
            triggerErrorEffects("Incorrect move!");
            $('#try-again-btn, #see-answer-btn').show();
        }

        function resetPuzzleMove() {
            game.undo();
            board.position(game.fen());
            updateTurnUI();
            $('#status').removeClass('msg-wrong').text('Try again...');
            $('#try-again-btn, #see-answer-btn').hide();
        }

        function showAnswer() {
            hasFailedCurrent = true;
            game.load(puzzles[currentIdx].target);
            board.position(game.fen());
            updateTurnUI();
            playSound('move');
            $('#status').removeClass('msg-wrong').text('Solution shown');
            $('#try-again-btn, #see-answer-btn').hide();
            if (currentIdx < puzzles.length - 1) $('#next-btn').show();
            else setTimeout(showFinalScore, 1500);
        }

        function showFinalScore() {
            $('#final-score-val').text(totalScore + "/" + puzzles.length);
            $('#score-screen').css('display', 'flex');
        }

        function loadPuzzle(idx) {
            currentIdx = idx; hasFailedCurrent = false; selectedSquare = null;
            $('.square-55d63').removeClass('highlight-selected');
            $('#q-text').text(puzzles[idx].question);
            $('#q-progress').text("Puzzle " + (idx + 1) + " of " + puzzles.length);
            $('#status').removeClass('msg-correct msg-wrong').text('Find the move');
            $('#next-btn, #try-again-btn, #see-answer-btn').hide();
            game.load(puzzles[idx].start);
            board.position(puzzles[idx].start);
            updateTurnUI();
        }

        function nextPuzzle() { loadPuzzle(++currentIdx); }

        $(document).ready(() => {
            board = Chessboard('board', {
                draggable: false,
                position: 'start',
                pieceTheme: 'https://cdn.jsdelivr.net/gh/jmcrd/enlightenupassets/img/pieces/icpieces/{piece}.svg'
            });
            initClickEvents();
            if (puzzles.length > 0 && isPreview) loadPuzzle(0);
            else updateTurnUI();
        });
    </script>
</body>
</html>
