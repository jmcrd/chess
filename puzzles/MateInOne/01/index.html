<!DOCTYPE html>
<html>
<head>
    <title>GitHub Chess Trainer</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        #myBoard { width: 450px; max-width: 90vw; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #333; }
        .controls { width: 320px; background: #2c3e50; padding: 20px; border-radius: 10px; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; box-sizing: border-box; background: #34495e; color: white; }
        button { width: 100%; padding: 12px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 5px; }
        button:hover { background: #2ecc71; }
        .status-box { margin-top: 15px; text-align: center; border-top: 1px solid #444; padding-top: 15px; }
        .win { color: #2ecc71; font-weight: bold; font-size: 1.2em; }
        .highlight { color: #f1c40f; }
        .highlight-sq { box-shadow: inset 0 0 5px 5px rgba(241, 196, 15, 0.8) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake-board { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

    <div class="container">
        <div id="myBoard"></div>

        <div class="controls">
            <h2 style="margin:0 0 15px 0">GitHub Trainer</h2>
            <input type="text" id="urlInput" placeholder="Paste PGN URL here...">
            <button onclick="fetchPgnFromUrl()">Load & Randomize</button>
            
            <div class="status-box">
                <div id="status">Waiting for PGN...</div>
                <div id="progress" style="font-size: 0.85em; color: #95a5a6; margin-top: 8px;"></div>
                <button id="resetBtn" style="display:none; background:#c0392b; margin-top:10px;" onclick="resetPool()">Restart Pool</button>
            </div>
        </div>
    </div>

    <script>
    var board = null, game = new Chess();
    var puzzlePool = [], solvedIndices = [], solutionHistory = [];
    var currentMoveIndex = 0, lockBoard = false, selectedSquare = null;

    // --- AUTOMATIC LOADING FROM URL PARAMETER ---
    window.onload = function() {
        board = ChessBoard('myBoard', { draggable: false, position: 'start', pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
        
        const params = new URLSearchParams(window.location.search);
        const pgnUrl = params.get('pgn');
        if (pgnUrl) {
            document.getElementById('urlInput').value = pgnUrl;
            fetchPgnFromUrl();
        }
    };

    async function fetchPgnFromUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return;
        document.getElementById('status').innerText = "Downloading...";
        
        try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            puzzlePool = data.contents.split(/\n(?=\[Event )/g).filter(p => p.trim().length > 10);
            
            if (puzzlePool.length > 0) {
                solvedIndices = [];
                document.getElementById('resetBtn').style.display = 'block';
                loadNextRandomPuzzle();
            } else {
                document.getElementById('status').innerText = "Error: No PGN data found.";
            }
        } catch (err) {
            document.getElementById('status').innerText = "Network Error.";
        }
    }

    function loadNextRandomPuzzle() {
        if (solvedIndices.length >= puzzlePool.length) {
            document.getElementById('status').innerHTML = "<span class='win'>🎉 FILE COMPLETED! 🎉</span>";
            return;
        }
        let randomIndex;
        do { randomIndex = Math.floor(Math.random() * puzzlePool.length); } 
        while (solvedIndices.includes(randomIndex));
        solvedIndices.push(randomIndex);
        parseAndLoadPuzzle(puzzlePool[randomIndex]);
        document.getElementById('progress').innerText = `Progress: ${solvedIndices.length} / ${puzzlePool.length}`;
    }

    function parseAndLoadPuzzle(pgnData) {
        game = new Chess();
        removeHighlights();
        lockBoard = false;
        selectedSquare = null;
        if (!game.load_pgn(pgnData)) return;
        solutionHistory = game.history();
        const startMatch = pgnData.match(/\[PuzzleStart "(\d+)"\]/);
        const startIdx = startMatch ? parseInt(startMatch[1]) : 0;
        const orientMatch = pgnData.match(/\[Orientation "(white|black)"\]/);
        board.orientation(orientMatch ? orientMatch[1] : 'white');
        game.reset();
        for(let i = 0; i < startIdx; i++) { game.move(solutionHistory[i]); }
        currentMoveIndex = startIdx;
        board.position(game.fen());
        updateStatusText();
        checkAutoMove();
    }

    function checkAutoMove() {
        if (currentMoveIndex < solutionHistory.length && board.orientation().charAt(0) !== game.turn()) {
            lockBoard = true;
            setTimeout(() => {
                game.move(solutionHistory[currentMoveIndex++]);
                board.position(game.fen());
                updateStatusText();
                lockBoard = false;
            }, 600);
        }
    }

    function executeMove(source, target) {
        if (lockBoard || currentMoveIndex >= solutionHistory.length) return;
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (!move || move.san !== solutionHistory[currentMoveIndex]) {
            if (move) game.undo();
            $('#myBoard').addClass('shake-board');
            setTimeout(() => $('#myBoard').removeClass('shake-board'), 300);
            return;
        }
        currentMoveIndex++;
        board.position(game.fen());
        removeHighlights();
        selectedSquare = null;
        if (currentMoveIndex < solutionHistory.length) { checkAutoMove(); } 
        else { 
            document.getElementById('status').innerHTML = "<span class='win'>Correct!</span>";
            setTimeout(loadNextRandomPuzzle, 1000); 
        }
    }

    function resetPool() { solvedIndices = []; loadNextRandomPuzzle(); }
    function removeHighlights() { $('#myBoard .square-55d63').removeClass('highlight-sq'); }
    function updateStatusText() {
        document.getElementById('status').innerHTML = `Solve: <span class='highlight'>${game.turn() === 'w' ? "White" : "Black"} to move</span>`;
    }
    function onSquareClick() {
        if (lockBoard) return;
        const square = $(this).attr('data-square');
        if (selectedSquare === square) { removeHighlights(); selectedSquare = null; return; }
        if (selectedSquare) { executeMove(selectedSquare, square); return; }
        if (game.get(square)?.color === game.turn()) {
            selectedSquare = square;
            $(this).addClass('highlight-sq');
        }
    }
    $(document).on('click', '#myBoard .square-55d63', onSquareClick);
    $(window).resize(() => board.resize());
    </script>
</body>
</html>
